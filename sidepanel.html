<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube CC Translator</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <span class="logo">CC</span>
        <div>
          <h1>YouTube CC Translator</h1>
          <p class="subtitle">Synced with YouTube CC — 2 lines</p>
        </div>
      </div>
      <button id="toggleBtn" class="toggle-btn" type="button" aria-pressed="false">
        <span class="toggle-dot"></span>
        <span id="toggleLabel">Enable CC Sync</span>
      </button>
    </header>

    <section class="status-card" id="statusCard">
      <span id="statusDot" class="status-dot"></span>
      <span id="statusText">CC sync is off</span>
    </section>

    <section class="current-card">
      <h2>Live Caption</h2>

      <div class="caption-block">
        <div class="caption-viewport yt-style muted" data-caption="original">
          <p class="caption-line" data-line="1"></p>
          <p class="caption-line active" data-line="2">Open a YouTube video and enable CC subtitles</p>
        </div>
      </div>

      <div class="caption-block pinyin-block">
        <label>Pinyin</label>
        <div class="caption-viewport yt-style pinyin" data-caption="pinyin">
          <p class="caption-line" data-line="1"></p>
          <p class="caption-line active" data-line="2"></p>
        </div>
      </div>
    </section>

    <footer class="footer">Mirrors YouTube CC in real time</footer>

    <script src="pinyin-pro.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
